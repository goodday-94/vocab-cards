<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vocab Cards</title>
<meta name="description" content="Visual vocabulary learning with audio pronunciation">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        <h1>Vocab Cards</h1>
        <p class="sidebar-byline">by Qilin Zhang</p>
      </div>
      <button id="token-btn" class="token-btn" title="Set GitHub token to enable editing">🔑</button>
    </div>
    <div class="sort-bar">
      <button id="sort-words" class="sort-btn">Words ↕</button>
      <button id="sort-date" class="sort-btn">Date ↕</button>
    </div>
    <div id="topic-list"></div>
  </aside>
  <div id="divider"></div>
  <main id="content">
    <div class="content-placeholder"><p>Select a topic to start learning</p></div>
  </main>
</div>

<div id="modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h3>Edit Card</h3>
    <div class="modal-field">
      <label>Word</label>
      <input id="modal-word" type="text" spellcheck="false">
    </div>
    <div class="modal-field">
      <label>IPA</label>
      <input id="modal-ipa" type="text" spellcheck="false">
    </div>
    <div class="modal-field">
      <label>Chinese</label>
      <input id="modal-chinese" type="text">
    </div>
    <div class="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-save">Save</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
